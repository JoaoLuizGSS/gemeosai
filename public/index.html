<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gêmeos AI | Chatbot</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome para os Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Biblioteca Marked.js para converter Markdown em HTML -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

    <!-- Tela de Login / Cadastro (Auth) -->
    <div class="auth-overlay" id="authOverlay">
        <div class="auth-box">
            <h2 id="authTitle">Entrar no Gêmeos</h2>
            <p id="authSubtitle">Faça login para salvar suas conversas</p>
            <div class="auth-input-group">
                <input type="text" id="authUsername" placeholder="Nome de usuário" autocomplete="off">
            </div>
            <div class="auth-input-group">
                <input type="password" id="authPassword" placeholder="Sua senha">
            </div>
            <button id="authSubmitBtn">Entrar</button>
            <div class="auth-toggle">
                Não tem uma conta? <span id="authToggleLink">Cadastre-se</span>
            </div>
        </div>
    </div>

    <!-- Interface Principal do Aplicativo -->
    <div class="app-container">
        <!-- Barra Lateral (Histórico) -->
        <aside class="sidebar">
            <button class="new-chat-btn" id="newChatBtn">
                <i class="fa-solid fa-plus"></i> Novo Chat
            </button>
            <div class="history-container" id="historyContainer">
                <!-- Os cards de histórico de chats entram aqui dinamicamente -->
            </div>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-badge" id="userBadge">U</div>
                    <button class="logout-btn" id="logoutBtn" title="Sair da Conta">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Área Principal do Chat -->
        <main class="chat-area">
            <div class="chat-container" id="chatContainer">
                <!-- Mensagem de Boas-Vindas Inicial -->
                <div class="welcome-screen" id="welcomeScreen">
                    <h1>Olá, eu sou o Gêmeos.</h1>
                    <p>Envie uma mensagem para iniciar e salvar esta conversa.</p>
                </div>
            </div>

            <!-- Barra de Entrada de Mensagens -->
            <div class="input-area">
                <div class="input-wrapper">
                    <button class="attach-btn" id="attachBtn" title="Enviar Arquivo">
                        <i class="fa-solid fa-paperclip"></i>
                    </button>
                    <input type="file" id="fileInput" style="display: none;">

                    <textarea id="userInput" placeholder="Converse com o Gêmeos ou peça uma imagem..."
                        rows="1"></textarea>

                    <button class="send-btn" id="sendBtn" title="Enviar Mensagem">
                        <i class="fa-solid fa-arrow-up"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
