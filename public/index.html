<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gêmeos IA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="auth-overlay" id="authOverlay">
        <div class="auth-box">
            <h2 id="authTitle">Entrar no Gêmeos</h2>
            <p id="authSubtitle">Faça login para salvar suas conversas</p>
            <div class="input-group">
                <label for="authUsername">Usuário</label>
                <input type="text" id="authUsername" placeholder="Digite seu usuário">
            </div>
            <div class="input-group">
                <label for="authPassword">Senha</label>
                <input type="password" id="authPassword" placeholder="Digite sua senha">
            </div>
            <button class="auth-btn" id="authSubmitBtn">Entrar</button>
            <p class="auth-toggle">Não tem uma conta? <span id="authToggleLink">Cadastre-se</span></p>
        </div>
    </div>

    <aside class="sidebar">
        <div>
            <button class="new-chat-btn" id="newChatBtn">
                <i class="fa-solid fa-plus"></i> Novo chat
            </button>
            <div class="chat-history">
                <p class="history-title">Suas Conversas Salvas</p>
                <div id="historyContainer"></div>
            </div>
        </div>
        <div class="sidebar-footer">
            <div class="footer-item" id="logoutBtn">
                <i class="fa-solid fa-right-from-bracket"></i> Sair da Conta
            </div>
        </div>
    </aside>

    <main class="main-chat">
        <header class="chat-header">
            <div class="brand">Gêmeos <i class="fa-solid fa-caret-down"></i></div>
            <div class="user-profile" id="userBadge">?</div>
        </header>

        <div class="chat-container" id="chatContainer">
            <div class="welcome-screen" id="welcomeScreen">
                <h1>Olá, eu sou o Gêmeos.</h1>
                <p>Envie uma mensagem para iniciar e salvar esta conversa.</p>
            </div>
        </div>

        <div class="input-container">
            <div class="input-box">
                <div class="action-icons" id="attachBtn" title="Enviar imagem ou arquivo">
                    <i class="fa-solid fa-paperclip"></i>
                </div>
                <input type="file" id="fileInput" style="display: none;" accept="image/*, .pdf, .doc, .docx, .txt">
                <textarea id="userInput" placeholder="Digite uma mensagem para o Gêmeos..." rows="1"></textarea>
                <div class="action-icons">
                    <i class="fa-solid fa-paper-plane send-btn" id="sendBtn" title="Enviar mensagem"></i>
                </div>
            </div>
            <p class="disclaimer">O Gêmeos usa criptografia local para sessões e rotas seguras no servidor do Vercel.</p>
        </div>
    </main>

    <!-- Biblioteca que transforma o texto da IA em formatação real (códigos, negrito, etc) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>
</body>
</html>
